<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rune Zero — Game Database</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#eef1f7; --panel:#ffffff; --panel-2:#f3f5fa; --panel-3:#e9edf5;
    --border:#dde2ec; --border-2:#cdd4e2;
    --gold:#b27c1b; --gold-deep:#8a5e10; --gold-soft:#f3e4c0;
    --rune:#0d9488; --rune-deep:#0b766e;
    --text:#1b2230; --ink:#0e1320; --muted:#6c7488; --faint:#9aa2b4;
    --common:#7f8794; --rare:#2f7fd6; --mythic:#8b5cf6; --legendary:#df8a1e;
    --good:#1f9d57; --warn:#e0794b; --bad:#d6453f;
    --shadow:0 1px 2px rgba(18,28,51,.04),0 4px 16px rgba(18,28,51,.06);
    --shadow-lg:0 8px 30px rgba(18,28,51,.10);
  }
  *{box-sizing:border-box}
  body{margin:0;background:
      radial-gradient(1200px 480px at 80% -120px,#e7ecfa 0,rgba(231,236,250,0) 70%),
      radial-gradient(900px 420px at -5% -80px,#eafaf6 0,rgba(234,250,246,0) 65%),
      var(--bg);
    color:var(--text);font-family:'Inter',system-ui,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased}
  a{color:var(--rune-deep);text-decoration:none;cursor:pointer;font-weight:500}
  a:hover{color:var(--rune);text-decoration:underline}
  code,.mono{font-family:'JetBrains Mono',monospace}
  ::selection{background:rgba(13,148,136,.18)}

  header.top{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.82);backdrop-filter:saturate(140%) blur(10px);border-bottom:1px solid var(--border)}
  .top-inner{max-width:1320px;margin:0 auto;padding:11px 22px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:10px;font-family:'Cinzel',serif;font-weight:700;letter-spacing:.16em;color:var(--gold-deep);text-transform:uppercase;font-size:15px}
  .brand .mark{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:#fff;font-size:16px;
    background:linear-gradient(135deg,#13b3a3,#0d9488);box-shadow:0 3px 10px rgba(13,148,136,.35)}
  .brand small{color:var(--faint);font-family:'JetBrains Mono';font-size:9.5px;letter-spacing:.2em;display:block;font-weight:500}
  nav.tabs{display:flex;gap:3px;margin-left:6px;flex-wrap:wrap}
  nav.tabs button{background:none;border:1px solid transparent;color:var(--muted);padding:7px 13px;border-radius:9px;font-size:13.5px;font-weight:600;cursor:pointer;transition:.12s}
  nav.tabs button.active{color:var(--gold-deep);background:linear-gradient(180deg,#fff,var(--panel-2));border-color:var(--border-2);box-shadow:var(--shadow)}
  nav.tabs button:hover{color:var(--ink);background:var(--panel-2)}
  .search-wrap{margin-left:auto;display:flex;gap:8px;align-items:center;flex:1;min-width:240px;max-width:520px}
  input.search{flex:1;background:#fff;border:1px solid var(--border-2);color:var(--text);border-radius:10px;padding:9px 13px;font-size:14px;outline:none;box-shadow:var(--shadow);transition:.12s}
  input.search:focus{border-color:var(--rune);box-shadow:0 0 0 3px rgba(13,148,136,.13)}
  input.search::placeholder{color:var(--faint)}
  select{background:#fff;border:1px solid var(--border-2);color:var(--text);border-radius:9px;padding:8px 10px;font-size:13px;box-shadow:var(--shadow);cursor:pointer}

  .shell{max-width:1320px;margin:0 auto;padding:18px 22px 90px;display:grid;grid-template-columns:1fr 1fr;gap:22px}
  @media(max-width:880px){.shell{grid-template-columns:1fr}}
  .col h3{font-family:'JetBrains Mono';font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin:2px 0 10px}

  .list{border:1px solid var(--border);border-radius:14px;overflow:hidden;background:var(--panel);box-shadow:var(--shadow)}
  table{border-collapse:collapse;width:100%;font-size:13.5px}
  th,td{padding:9px 13px;text-align:left;border-bottom:1px solid var(--border)}
  thead th{position:sticky;top:0;background:var(--panel-3);font-family:'JetBrains Mono';font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:600;z-index:1}
  tbody tr{cursor:pointer;transition:background .1s}
  tbody tr:hover{background:var(--panel-2)}
  tbody tr.sel{background:linear-gradient(90deg,rgba(13,148,136,.12),rgba(13,148,136,.04));box-shadow:inset 3px 0 0 var(--rune)}
  td.mono{font-family:'JetBrains Mono';color:var(--faint);font-size:12px}
  .badge{display:inline-block;font-family:'JetBrains Mono';font-size:10px;font-weight:600;padding:1px 6px;border-radius:6px;border:1px solid var(--border-2);color:var(--muted);background:var(--panel-2);vertical-align:middle}
  .badge.custom{color:var(--rune-deep);border-color:rgba(13,148,136,.4);background:rgba(13,148,136,.08)}
  .badge.mvp{color:#fff;border-color:transparent;background:linear-gradient(135deg,#f0b94e,#d6891b);box-shadow:0 1px 4px rgba(214,137,27,.4)}
  .scry{max-height:calc(100vh - 200px);overflow:auto;display:block}
  .count{font-size:12px;color:var(--muted);margin:8px 2px}

  .detail{border:1px solid var(--border);border-radius:14px;background:var(--panel);padding:20px 22px;min-height:200px;position:sticky;top:78px;max-height:calc(100vh - 96px);overflow:auto;box-shadow:var(--shadow)}
  .detail .empty{color:var(--faint);text-align:center;padding:60px 0}
  .detail h2{font-family:'Cinzel',serif;font-size:22px;margin:0 0 2px;color:var(--ink);line-height:1.2}
  .detail .sub{color:var(--muted);font-size:12.5px;margin-bottom:14px}
  .kv{display:grid;grid-template-columns:auto 1fr;gap:6px 16px;font-size:13.5px;margin:12px 0}
  .kv dt{color:var(--muted)}
  .kv dd{margin:0;font-weight:500}
  .sec{margin-top:16px;border-top:1px solid var(--border);padding-top:13px}
  .sec h4{font-family:'JetBrains Mono';font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-deep);margin:0 0 9px}
  pre.script{background:#0f1626;border:1px solid #1d2740;border-radius:9px;padding:11px 13px;font-size:12px;overflow:auto;color:#6fe0d2;white-space:pre-wrap;line-height:1.5}
  .droprow{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
  .droprow:last-child{border-bottom:none}
  .droprow .dl{display:flex;align-items:center;gap:8px;min-width:0}
  .rate{font-family:'JetBrains Mono';color:var(--muted);font-size:12px;white-space:nowrap}
  .note{border-left:3px solid var(--rune);background:linear-gradient(90deg,rgba(13,148,136,.07),transparent);border-radius:0 8px 8px 0;padding:10px 13px;font-size:13px;margin:12px 0;color:var(--text)}
  .pill{display:inline-block;font-family:'JetBrains Mono';font-size:11px;background:var(--panel-2);border:1px solid var(--border-2);color:var(--muted);padding:3px 9px;border-radius:999px;margin:2px 4px 2px 0}

  .loading,.errbox{max-width:680px;margin:80px auto;text-align:center;color:var(--muted)}
  .errbox code{background:var(--panel-2);padding:2px 8px;border-radius:6px;color:var(--gold-deep)}
  .systems{max-width:960px;margin:0 auto;padding:8px 4px}
  .systems h2{font-family:'Cinzel',serif;color:var(--gold-deep);font-size:26px}
  .syscards{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:760px){.syscards{grid-template-columns:1fr}}
  .systems .card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .systems .card:before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--rune),#37c0b2)}
  .systems .card.g:before{background:linear-gradient(180deg,#e7a93a,#d6891b)}
  .systems .card h4{margin:0 0 7px;color:var(--ink);font-family:'Cinzel',serif;font-size:16px;display:flex;align-items:center;gap:9px}
  .systems .card h4 .si{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;font-size:16px;background:var(--panel-2);border:1px solid var(--border);flex:none}
  .systems .card p{margin:0;font-size:13.5px;color:var(--text)}
  .hide{display:none}
  .ihead{display:flex;gap:14px;align-items:flex-start;margin-bottom:6px}
  .iimg{width:62px;height:62px;flex:none;border:1px solid var(--border-2);border-radius:11px;background:var(--panel-2);object-fit:contain;padding:4px;image-rendering:pixelated}
  .iimg.hide{display:none}
  td .ico{width:22px;height:22px;vertical-align:middle;margin-right:8px;image-rendering:pixelated;flex:none}
  .eff{font-size:13.5px;margin:4px 0 4px 15px;position:relative}
  .eff:before{content:'▸';position:absolute;left:-14px;color:var(--rune)}
  .eff.cond{color:var(--gold-deep);font-weight:700;margin:11px 0 2px 0}
  .eff.cond:before{content:''}
  details.raw{margin-top:10px}
  details.raw summary{cursor:pointer;color:var(--muted);font-size:11.5px;font-family:'JetBrains Mono';letter-spacing:.04em}

  /* ---- visual primitives ------------------------------------------------- */
  /* element chip */
  .ele{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:2px 9px 2px 7px;border-radius:999px;border:1px solid;line-height:1.5}
  .ele i{font-style:normal;font-size:12px}
  .ele.clk{cursor:pointer;transition:.1s}.ele.clk:hover{filter:brightness(.94);box-shadow:0 1px 4px rgba(18,28,51,.12)}
  /* element matchup */
  .emxwrap{display:flex;flex-wrap:wrap;gap:6px}
  .emx{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:3px 9px;border-radius:8px;border:1px solid}
  .emx i{font-style:normal}.emx b{font-family:'JetBrains Mono';font-size:11.5px}
  /* in-game loot-beam dot */
  .beamdot{width:9px;height:9px;border-radius:50%;flex:none;box-shadow:0 0 0 2px rgba(255,255,255,.7),0 0 6px currentColor;display:inline-block}
  .beamleg{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);margin:3px 12px 3px 0}
  .beampill{display:inline-block;width:16px;height:30px;border-radius:4px;vertical-align:middle;
    box-shadow:inset 0 0 6px rgba(255,255,255,.5);background:linear-gradient(180deg,currentColor,transparent)}
  /* rate bar (drop rarity) */
  .ratewrap{display:flex;align-items:center;gap:7px}
  .ratebar{width:46px;height:5px;border-radius:3px;background:var(--panel-3);overflow:hidden;flex:none}
  .ratebar i{display:block;height:100%;border-radius:3px}
  /* monster stat mini-bars */
  .stats6{display:grid;grid-template-columns:repeat(3,1fr);gap:6px 16px;margin:10px 0}
  .statb{font-size:12px}
  .statb .lab{display:flex;justify-content:space-between;color:var(--muted);font-family:'JetBrains Mono';font-size:10.5px;letter-spacing:.04em}
  .statb .bar{height:5px;border-radius:3px;background:var(--panel-3);margin-top:2px;overflow:hidden}
  .statb .bar i{display:block;height:100%;background:linear-gradient(90deg,#37c0b2,#0d9488);border-radius:3px}
  /* hp bar */
  .hpbar{height:7px;border-radius:4px;background:var(--panel-3);overflow:hidden;margin-top:4px}
  .hpbar i{display:block;height:100%;background:linear-gradient(90deg,#5fc97a,#1f9d57)}
  /* class avatar (skill changes) */
  .clsava{width:46px;height:46px;border-radius:50%;flex:none;display:grid;place-items:center;overflow:hidden;
    background:radial-gradient(circle at 50% 30%,#fff,var(--panel-2));border:2px solid var(--border-2);box-shadow:var(--shadow)}
  .clsava img{width:42px;height:46px;object-fit:contain;object-position:bottom;image-rendering:pixelated;margin-bottom:-2px}
  .clsava span{font-size:22px}
  /* before -> after comparison */
  .cmp{display:flex;flex-wrap:wrap;gap:7px;margin-top:7px}
  .cmpchip{display:flex;align-items:center;gap:7px;background:var(--panel-2);border:1px solid var(--border);border-radius:9px;padding:5px 9px 5px 8px;font-size:12px}
  .cmpchip .cf{color:var(--muted);font-family:'JetBrains Mono';font-size:10px;letter-spacing:.04em;text-transform:uppercase}
  .cmpbar{position:relative;width:84px;height:14px;border-radius:4px;background:var(--panel-3);overflow:hidden;flex:none}
  .cmpbar .b4{position:absolute;left:0;top:0;bottom:0;background:repeating-linear-gradient(45deg,#cdd4e2,#cdd4e2 3px,#d9dfea 3px,#d9dfea 6px);opacity:.8}
  .cmpbar .af{position:absolute;left:0;top:0;bottom:0;border-radius:4px}
  .cmpbar.up .af{background:linear-gradient(90deg,#5fc97a,#1f9d57)}
  .cmpbar.down .af{background:linear-gradient(90deg,#6fb6ef,#2f7fd6)}
  .cmpval{font-family:'JetBrains Mono';font-size:11.5px}
  .cmpval b{color:var(--ink)}
  .cmpval .o{color:var(--faint);text-decoration:line-through;font-size:10.5px}
  .delta{font-family:'JetBrains Mono';font-size:11px;font-weight:700;padding:0 5px;border-radius:5px}
  .delta.g{color:var(--good);background:rgba(31,157,87,.1)}
  .delta.b{color:var(--rare);background:rgba(47,127,214,.1)}
  /* tier rail in skill changes */
  .tierhead{display:flex;align-items:center;gap:10px;margin:28px 0 14px}
  .tierhead .tn{font-family:'Cinzel',serif;color:var(--gold-deep);font-size:18px}
  .tierhead .tl{flex:1;height:1px;background:linear-gradient(90deg,var(--border-2),transparent)}
  .clscard{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:12px;box-shadow:var(--shadow)}
  .clscard>.ch{display:flex;align-items:center;gap:12px;margin-bottom:4px}
  .clscard>.ch .cn{font-family:'Cinzel',serif;font-size:17px;color:var(--ink)}
  .clscard>.ch .cc{margin-left:auto;font-size:11px;color:var(--muted);font-family:'JetBrains Mono'}
  .skrow{padding:9px 0;border-top:1px solid var(--border)}
  .skrow:first-of-type{border-top:none}
  .skrow .sn{font-weight:600;color:var(--ink)}
  .skrow .sa{color:var(--faint);font-size:11.5px;font-family:'JetBrains Mono'}
  .skrow .sb{color:var(--muted);font-size:12px;font-style:italic}
  .tag{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:5px;letter-spacing:.03em;text-transform:uppercase}
  .tag.dmg{color:#fff;background:linear-gradient(135deg,#ef8a5b,#e0794b)}
  .tag.use{color:#fff;background:linear-gradient(135deg,#5aa6ea,#2f7fd6)}
  .hero{background:linear-gradient(120deg,#fff,var(--panel-2));border:1px solid var(--border);border-radius:16px;padding:18px 22px;margin-bottom:18px;box-shadow:var(--shadow);display:flex;gap:18px;flex-wrap:wrap;align-items:center}
  .hero .hx{flex:1;min-width:240px}
  .hero h2{margin:0 0 4px}
  .hero p{margin:0;color:var(--muted);font-size:13.5px}
  .statline{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .statbox{background:var(--panel);border:1px solid var(--border);border-radius:11px;padding:9px 14px;text-align:center;min-width:84px;box-shadow:var(--shadow)}
  .statbox b{display:block;font-size:20px;color:var(--rune-deep);font-family:'Cinzel',serif;line-height:1.1}
  .statbox small{color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.08em}
  /* home / landing */
  .homewrap{max-width:980px;margin:0 auto;padding:10px 4px 60px}
  .homehero{background:
      radial-gradient(900px 300px at 90% -60px,rgba(13,148,136,.12),transparent 70%),
      linear-gradient(120deg,#fff,var(--panel-2));display:block;padding:26px 28px}
  .homehero .kicker{font-family:'JetBrains Mono';font-size:11px;letter-spacing:.22em;color:var(--rune-deep);font-weight:700;margin-bottom:8px}
  .homehero h1{font-family:'Cinzel',serif;font-size:40px;margin:0 0 8px;color:var(--gold-deep);letter-spacing:.04em;line-height:1}
  .homehero p{font-size:14.5px;color:var(--text);max-width:680px;margin:0}
  .homeh{font-family:'Cinzel',serif;color:var(--gold-deep);font-size:20px;margin:28px 0 12px}
  .hlinks{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  @media(max-width:700px){.hlinks{grid-template-columns:1fr 1fr}}
  .hlink{display:flex;align-items:center;gap:11px;text-align:left;background:var(--panel);border:1px solid var(--border);border-radius:13px;padding:13px 15px;cursor:pointer;box-shadow:var(--shadow);transition:.12s;font:inherit;color:inherit}
  .hlink:hover{border-color:var(--rune);transform:translateY(-1px);box-shadow:var(--shadow-lg)}
  .hlink .si{width:36px;height:36px;border-radius:9px;display:grid;place-items:center;font-size:18px;background:var(--panel-2);border:1px solid var(--border);flex:none}
  .hlink b{display:block;font-size:14px;color:var(--ink)}
  .hlink small{color:var(--muted);font-size:11.5px}
  .homefoot{margin-top:26px;color:var(--muted);font-size:12.5px;text-align:center}
</style>
</head>
<body>

<header class="top">
  <div class="top-inner">
    <div class="brand"><span class="mark">✦</span><span>Rune&nbsp;Zero<small>GAME DATABASE</small></span></div>
    <nav class="tabs">
      <button data-view="home" class="active">Home</button>
      <button data-view="items">Items</button>
      <button data-view="mobs">Monsters</button>
      <button data-view="skills">Skill Items</button>
      <button data-view="enchants">Enchants</button>
      <button data-view="systems">Systems</button>
      <button data-view="balance">Skill Changes</button>
    </nav>
    <div class="search-wrap" id="searchWrap">
      <input class="search" id="search" placeholder="Search by name, ID, or aegis…" autocomplete="off">
      <select id="filterType"></select>
    </div>
  </div>
</header>

<div id="app">
  <div class="loading" id="loading">
    <div style="font-family:'Cinzel',serif;font-size:20px;color:var(--gold)">Loading the database…</div>
    <div id="loadmsg" style="margin-top:8px">fetching items &amp; monsters</div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
let ITEMS=[], MOBS=[], META={}, OPT={types:{},groups:[]}, ELEM=null, ITEM_BY_ID=new Map(), MOB_BY_ID=new Map(), GROUP_BY_ID=new Map(), GROUP_BY_NAME=new Map();
function gearGroup(i){
  if(i.type==='Weapon') return 'RZ_DROP_WEAPON';
  if(i.type!=='Armor') return null;
  const L=(i.loc||[]).join(' ');
  if(/Head/.test(L)) return 'RZ_DROP_HEADGEAR';
  if(/Left_Hand/.test(L)) return 'RZ_DROP_SHIELD';
  if(/Garment/.test(L)) return 'RZ_DROP_GARMENT';
  if(/Shoes/.test(L)) return 'RZ_DROP_SHOES';
  if(/Accessory/.test(L)) return 'RZ_DROP_ACCESSORY';
  if(/Armor/.test(L)) return 'RZ_DROP_ARMOR';
  return null;
}
// item icons (public Divine Pride CDN)
const IMG = id => 'https://static.divine-pride.net/images/items/collection/'+id+'.png';
const ICO = id => 'https://static.divine-pride.net/images/items/item/'+id+'.png';
let SKILLS = {};
function skillName(a){ return SKILLS[a] || a.replace(/^[A-Z]{1,3}_/,'').replace(/_/g,' ').toLowerCase().replace(/\b\w/g,c=>c.toUpperCase()); }
// friendly enchant-pool names
const FRIENDLY_GROUP={RZ_DROP_WEAPON:'Weapon Enchants',RZ_DROP_ARMOR:'Armor Enchants',RZ_DROP_SHIELD:'Shield Enchants',RZ_DROP_GARMENT:'Garment Enchants',RZ_DROP_SHOES:'Footgear Enchants',RZ_DROP_ACCESSORY:'Accessory Enchants',RZ_DROP_HEADGEAR:'Headgear Enchants'};
const SLOT_NICE={ARMOR:'Armor',SHIELD:'Shield',GARMENT:'Garment',SHOES:'Footgear',ACC:'Accessory',HEAD:'Headgear',HEADGEAR:'Headgear'};
function friendlyGroup(n){
  if(FRIENDLY_GROUP[n]) return FRIENDLY_GROUP[n];
  let m=/^RZ_([A-Z]+)_S(\d)$/.exec(n); if(m) return (SLOT_NICE[m[1]]||m[1][0]+m[1].slice(1).toLowerCase())+' Enchant Pool '+m[2];
  if(n.startsWith('RZ_RDMOPT')) return n;
  return n.replace(/_/g,' ').toLowerCase().replace(/\b\w/g,c=>c.toUpperCase()); // base groups -> Title Case
}
// ---- bonus script -> plain language ----------------------------------------
function plainEffect(script){
  const RC={RC_Formless:'Formless',RC_Undead:'Undead',RC_Brute:'Brute',RC_Plant:'Plant',RC_Insect:'Insect',RC_Fish:'Fish',RC_Demon:'Demon',RC_DemiHuman:'Demi-Human',RC_Angel:'Angel',RC_Dragon:'Dragon',RC_Player_Human:'Players',RC_All:'all races',RC_NonBoss:'non-Boss',RC_NonPlayer:'monsters'};
  const EL={Ele_Neutral:'Neutral',Ele_Water:'Water',Ele_Earth:'Earth',Ele_Fire:'Fire',Ele_Wind:'Wind',Ele_Poison:'Poison',Ele_Holy:'Holy',Ele_Dark:'Shadow',Ele_Ghost:'Ghost',Ele_Undead:'Undead',Ele_All:'all elements'};
  const SZ={Size_Small:'Small',Size_Medium:'Medium',Size_Large:'Large',Size_All:'all sizes'};

async function boot(){
  try{
    const [it,mo,me,op,sk,el] = await Promise.all([
      fetch('data/items.json').then(r=>{if(!r.ok)throw 0;return r.json()}),
      fetch('data/mobs.json').then(r=>r.json()),
      fetch('data/meta.json').then(r=>r.json()),
      fetch('data/options.json').then(r=>r.json()),
      fetch('data/skills.json').then(r=>r.json()).catch(()=>({})),
      fetch('data/elements.json').then(r=>r.json()).catch(()=>null),
    ]);
    ITEMS=it; MOBS=mo; META=me; OPT=op; SKILLS=sk; ELEM=el;
    ITEMS.forEach(i=>{i._s=(i.name+' '+(i.aegis||'')+' '+i.id+' '+(i.boosts||[]).map(b=>b.skill).join(' ')).toLowerCase(); ITEM_BY_ID.set(i.id,i);});
    MOBS.forEach(m=>{m._s=(m.name+' '+(m.aegis||'')+' '+m.id+' '+ELE[eleIdx(m.element)]+' '+(m.element||'')+' '+RACE[raceIdx(m.race)]+' '+(m.size||'')+(m.mvp?' mvp':'')).toLowerCase(); MOB_BY_ID.set(m.id,m);});
    OPT.groups.forEach(g=>{g._s=(g.name).toLowerCase(); GROUP_BY_ID.set(g.id,g); GROUP_BY_NAME.set(g.name,g);});
    initUI();
  }catch(e){
    $('#app').innerHTML='<div class="errbox"><h2 style="color:var(--gold);font-family:Cinzel">Couldn’t load the data files</h2>'
      +'<p>Browsers block <code>fetch()</code> of local files. Serve this folder over http:</p>'

}

function setView(v){

  const isPanel = (v==='systems'||v==='balance'||v==='home');
  $('#searchWrap').style.visibility = isPanel?'hidden':'visible';
  $('#browse').classList.toggle('hide', isPanel);
  $('#systems').classList.toggle('hide', v!=='systems');
  $('#balance').classList.toggle('hide', v!=='balance');
  $('#home').classList.toggle('hide', v!=='home');

    ? ['All types','Weapon','Armor','Card','Healing','Usable','Etc','Delayconsume','Ammo','Custom']
    : v==='mobs' ? ['All','MVP only','Normal only']
    : v==='skills' ? ['Trans skills (up to ep13)']

function render(){
  const q=$('#search').value.trim().toLowerCase(), ft=$('#filterType').value;
  const rows=$('#rows'); let out='', n=0, total=0;
  if(view==='items'){
    for(const i of ITEMS){
      if(q && !i._s.includes(q)) continue;
      if(ft==='Custom' && !i.custom) continue;
      else if(ft!=='All types' && ft!=='Custom' && i.type!==ft) continue;
      total++; if(n<300){out+=`<tr data-id="${i.id}"><td class="mono">${i.id}</td><td><img class="ico" src="${ICO(i.id)}" loading="lazy" onerror="this.style.display='none'">${esc(i.name)} ${i.custom?'<span class="badge custom">RZ</span>':''}${i.slots?` <span class="badge">[${i.slots}]</span>`:''}</td><td>${i.type||''}</td><td>${(i.loc||[]).join(', ')||'-'}</td></tr>`;n++;}
    }
  }else if(view==='mobs'){
    for(const m of MOBS){
      if(q && !m._s.includes(q)) continue;
      if(ft==='MVP only' && !m.mvp) continue;
      if(ft==='Normal only' && m.mvp) continue;
      total++; if(n<300){out+=`<tr data-id="${m.id}"><td class="mono">${m.id}</td><td class="mono">${m.lvl||''}</td><td>${esc(m.name)} ${m.mvp?'<span class="badge mvp">MVP</span>':''}</td><td>${eleChip(m.element,m.eleLv)}</td></tr>`;n++;}
    }
  }else if(view==='skills'){
    for(const i of ITEMS){
      if(!i.boosts||!i.boosts.length) continue;
      const trans=i.boosts.filter(b=>!b.t3);
      if(!trans.length) continue;                 // ep13 server: hide pure-3rd-class items
      if(q && !i._s.includes(q)) continue;
      total++; if(n<300){
        const has3=i.boosts.some(b=>b.t3);
        const skn=trans.map(b=>skillName(b.skill)).slice(0,3).join(', ')+(trans.length>3?' +'+(trans.length-3):'');
        const tier=has3?'<span class="badge">+3rd</span>':'<span class="badge">Trans</span>';
        out+=`<tr data-id="${i.id}"><td class="mono">${i.id}</td><td><img class="ico" src="${ICO(i.id)}" loading="lazy" onerror="this.style.display='none'">${esc(i.name)} ${i.custom?'<span class="badge custom">RZ</span>':''}</td><td style="font-size:12px">${esc(skn)}</td><td>${tier}</td></tr>`;n++;
      }
    }

const CLASS_EMOJI={'Novice':'🔰','Swordman':'🗡️','Knight':'⚔️','Crusader':'🛡️','Merchant':'💰','Blacksmith':'🔨','Whitesmith':'🔨','Alchemist':'⚗️','Creator':'⚗️','Thief':'🥷','Assassin':'🗡️','Assassin Cross':'🗡️','Rogue':'🃏','Stalker':'🃏','Mage':'✨','Wizard':'🔮','High Wizard':'🔮','Sage':'📖','Professor':'📖','Acolyte':'🙏','Priest':'✨','High Priest':'✨','Monk':'👊','Champion':'👊','Archer':'🏹','Hunter':'🏹','Sniper':'🏹','Bard/Clown':'🎵','Dancer/Gypsy':'💃','Clown/Gypsy':'🎵','Lord Knight':'⚔️','Paladin':'🛡️','Gunslinger':'🔫','Ninja':'🥷','TaeKwon':'🦵','Star Gladiator':'☀️','Soul Linker':'🔗','Super Novice':'🔰'};

let BALANCE=null;
async function renderBalance(){
  const el=$('#balance');
  const be=x=>String(x).replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
  if(!BALANCE){
    el.innerHTML='<div style="padding:24px;color:var(--muted)">Loading skill changes…</div>';
    try{ BALANCE=await fetch('data/skillchanges.json').then(r=>r.json()); }
    catch(e){ el.innerHTML='<div style="padding:24px">Could not load <code>data/skillchanges.json</code>.</div>'; return; }
  }
  const tierName=['Novice','1st Class','2nd Class','Transcendent','Expanded'];
  const FIELD={CastTime:['Cast','ms'],FixedCastTime:['Fixed cast','ms'],AfterCastActDelay:['Delay','ms'],AfterCastWalkDelay:['Walk delay','ms'],Cooldown:['Cooldown','ms'],SpCost:['SP',''],SP:['SP',''],HpRateCost:['HP cost','%'],ZenyCost:['Zeny','z'],ItemCost:['Items','']};
  const num=x=>{const m=/-?\d+(\.\d+)?/.exec(String(x));return m?parseFloat(m[0]):null;};
  const lvCoef=x=>{const m=/(\d+)\s*\*\s*lv/i.exec(String(x));return m?+m[1]:null;};
  // visual before->after bar: track sized to max(before,after); hatched ghost=before, colour=after
  function cmpBar(before,after,dir){ // dir 'up'(green, bigger=better) | 'down'(blue, smaller=better)
    const mx=Math.max(before,after,1)||1;
    return `<span class="cmpbar ${dir}"><span class="b4" style="width:${Math.round(before/mx*100)}%"></span><span class="af" style="width:${Math.round(after/mx*100)}%"></span></span>`;
  }
  function usChip(u){
    const f=FIELD[u.field]||[u.field,''], b=num(u.before), a=num(u.after);
    let bar='',delta='';
    if(b!=null&&a!=null&&b>0){ bar=cmpBar(b,a,'down'); const d=Math.round((a/b-1)*100); if(d!==0) delta=`<span class="delta b">${d>0?'+':''}${d}%</span>`; }
    return `<span class="cmpchip"><span class="cf">${be(f[0])}</span>${bar}<span class="cmpval"><span class="o">${be(u.before)}${f[1]}</span> <b>${be(u.after)}${f[1]}</b></span>${delta}</span>`;
  }
  function dmgChip(d){
    const b=lvCoef(d.before), a=lvCoef(d.after); let bar='',delta='';
    if(b!=null&&a!=null&&b>0){ bar=cmpBar(b,a,'up'); const g=Math.round((a/b-1)*100); if(g) delta=`<span class="delta g">${g>0?'+':''}${g}%</span>`; }
    return `<span class="cmpchip"><span class="cf" style="color:var(--warn)">DMG /lv</span>${bar}<span class="cmpval"><span class="o">${be(d.before)}</span> <b>${be(d.after)}</b></span>${delta}</span>`;
  }
  const groups={};
  BALANCE.forEach(s=>{const k=s.classOrder+'|'+s.class;(groups[k]=groups[k]||[]).push(s);});
  const keys=Object.keys(groups).sort((a,b)=>{const ao=+a.split('|')[0],bo=+b.split('|')[0];return ao-bo||a.split('|')[1].localeCompare(b.split('|')[1]);});
  const usab=BALANCE.filter(s=>s.usability&&s.usability.length).length, dmg=BALANCE.filter(s=>s.damage).length;
  let h='<div style="max-width:1100px;margin:0 auto;padding:8px 4px 50px">'
    +'<div class="hero"><div class="hx"><h2 style="font-family:Cinzel,serif;color:var(--gold-deep)">Skill Changes — before → after</h2>'
    +'<p>Every skill Rune Zero rebalanced, grouped by class. <b style="color:var(--rare)">Usability</b> bars shrink — cast / cooldown / SP eased so a skill becomes spammable &amp; affordable. <b style="color:var(--warn)">Damage</b> bars grow — per-level ratio buffed so it hits hard enough to main on. Hatched = old, solid = new.</p></div>'
    +`<div class="statline"><div class="statbox"><b>${BALANCE.length}</b><small>Skills</small></div><div class="statbox"><b>${usab}</b><small>Usability</small></div><div class="statbox"><b>${dmg}</b><small>Damage</small></div></div></div>`;
  let lastTier=-1;
  keys.forEach(k=>{
    const arr=groups[k], ord=+k.split('|')[0], cls=k.split('|')[1];
    if(ord!==lastTier){ lastTier=ord; h+=`<div class="tierhead"><span class="tn">${tierName[ord]}</span><span class="tl"></span></div>`; }
    h+=`<div class="clscard"><div class="ch">${clsIcon(cls)}<span class="cn">${be(cls)}</span><span class="cc">${arr.length} skill${arr.length!==1?'s':''}</span></div>`;
    arr.forEach(s=>{
      h+=`<div class="skrow"><span class="sn">${be(s.skill)}</span> <span class="sa">${be(s.aegis)}</span>`;
      if(s.damage) h+=' <span class="tag dmg">dmg</span>';
      if(s.usability&&s.usability.length) h+=' <span class="tag use">usability</span>';
      if(s.build) h+=`<div class="sb">${be(s.build)}</div>`;
      h+='<div class="cmp">';
      (s.usability||[]).forEach(u=>h+=usChip(u));
      if(s.damage) h+=dmgChip(s.damage);
      h+='</div></div>';
    });
    h+='</div>';
  });
  h+='</div>';
  el.innerHTML=h;
}

  ${card('👑','Champion / Lucky / Frenzy monsters','Any normal kill has a small chance to spawn a roaming <b>special</b> of that monster: a <b>Champion</b> (mini-boss, ~3× strength, minions, guaranteed top-roll drop), a <b>Frenzy</b> (fast brawler → EXP burst), or a rare <b>Lucky</b> (loot piñata ≈100 kills). Each wears a coloured aura + map announce, and rolls <b>1–3 affixes</b> (Sturdy, Vigorous, Swift, Deadly, Resilient, Evasive) that stack onto its name — e.g. <i>“Swift Deadly Champion Poring”</i>. More affixes = a <b>small</b> Valor + EXP bonus (cards stay 1×).')}
  ${card('🎯','Monster Hunter (bounties)','Hunt a target monster enough times and claim a skill/stat reward item. An editable bounty board: each row binds a monster → kill requirement → reward. Progress tracked per character.')}
  ${card('🌱','Memorial growing gear &amp; instances','A 5-piece <b>Memorial set</b> crafted from instance materials that <b>grows with you</b> — refine-gated bonuses (+3/+6/+9) plus a non-destructive option enchanter and a scaling set bonus. Materials drop from level-gated <b>Memorial instances</b> (Orc\'s Memory, Nidhoggur\'s Nest) in Normal/Hard.')}
  ${card('💠','Class Essences','Trans-class <b>Essence</b> accessories (Lv 1 &amp; 2 per class, IDs 40800+) granting a class stat plus % boosts to that class\'s signature skills — faithful to kRO Zero, tuned for our high-damage server.')}
  ${card('🏆','Legacy MVP trophies (high-damage)','Dead legacy MVP gear revived into refine-gated chase pieces — e.g. Majestic Goat: Bash / Bowling Bash <b>+28%</b> at +9. The server is intentionally high-damage; trophy spikes are meaningful, not timid.')}
  ${card('🏛️','Services Hub (Eden HQ)','The Eden Group HQ doubles as the all-in-one hub: register for the Eden badge, take bounty missions, and find every service — forge, refine, enchant, instances, Monster Hunter, stylist, storage — in one map. <code>@go eden</code> warps there.')}
  ${card('⚒️','Forge — risk &amp; reward','Forge any weapon with <b>5 random properties</b> and a chosen <b>element</b> baked in. ~70% success; failure consumes the materials. More ore, low coin.')}
  ${card('🗡️','Eden weapons','A per-class weapon line bought with the <b>Eden badge</b>: each arrives <b>already enhanced</b> (5 options on purchase), is <b>refine-gated</b> (+3/+6/+9), and is re-rollable. Account-bound personal progression.')}
  ${card('📅','Daily &amp; weekly loops','<b>Daily Tasks</b>: 3 rotating jobs reset at server midnight, with an escalating <b>login streak</b> day-7 jackpot. <b>Weekly Hunt</b>: a rotating featured MVP with a cross-player leaderboard and tiered rewards. The retention spine.')}
  ${card('🛍️','Cash shop — cosmetics + pay-to-fast','The <b>Rune Zero Boutique</b> sells <b>weekly-rotating cosmetic sets</b> (zero stats) plus pay-to-fast bundles (EXP/common-drop boosts, convenience, VIP). <b>No power, no cards, no card/drop-on-card boosts ever sold</b>.')}
  ${card('⚖️','Class &amp; monster balance','High-damage, multi-build philosophy: <b>52 underused skills</b> made spammable/affordable and <b>15 given real damage</b> so every class has 2–3 viable builds. To match, <b>26 MVPs were toughened ~2.5–3× HP</b> and elites bumped — bosses bite back. See the <b>Skill Changes</b> tab for every before→after.')}
  ${card('🔭','Planned','An in-game <b>economy pass</b> (rationalising the coin/currency set) and a full <b>balance tuning</b> sweep once class damage is tested in-game.')}
  ${card('🧩','Custom items',`${(META.customItems||0)} Rune Zero items are flagged <span class="badge custom">RZ</span> in the Items tab (use the <b>Custom</b> filter). The DB has ${(META.items||0).toLocaleString()} items and ${(META.mobs||0).toLocaleString()} monsters; built ${META.built||''}.`)}
  </div>`;
}

const row=(k,v)=> v!=null&&v!==''?`<dt>${k}</dt><dd>${v}</dd>`:'';
const esc=s=>String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const pct=r=>r>=100?(r/100).toFixed(r%100?2:0)+'%':(r/100).toFixed(2)+'%';
function debounce(f,ms){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>f(...a),ms);};}
boot();
</script>
